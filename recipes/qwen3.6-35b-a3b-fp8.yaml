# Recipe: Qwen/Qwen3.6-35B-A3B-FP8
# Native FP8 weights (~17.5 GB on disk). Marlin-friendly on GB10.
# Architecture is byte-for-byte identical to Qwen3.5-35B-A3B-FP8 (per Qwen team),
# so the 3.5 mods apply unchanged.

recipe_version: "1"
name: Qwen36-35B-A3B-FP8
description: vLLM serving Qwen3.6-35B-A3B-FP8

# HuggingFace model to download (optional, for --download-model)
model: Qwen/Qwen3.6-35B-A3B-FP8

# Supports both single-node and multi-node — runner overrides tensor_parallel
# to 1 in solo mode automatically.

# Container image to use
container: vllm-node

# Mod required to fix slowness and crash in the cluster
# (tracking https://github.com/vllm-project/vllm/issues/33857)
mods:
  - mods/fix-qwen3-coder-next
  - mods/fix-qwen3.5-chat-template

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.7
  max_model_len: 32768
  max_num_batched_tokens: 16384

# Environment variables
env:
  VLLM_MARLIN_USE_ATOMIC_ADD: 1

# The vLLM serve command template
command: |
  vllm serve Qwen/Qwen3.6-35B-A3B-FP8 \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --kv-cache-dtype fp8 \
    --load-format fastsafetensors \
    --attention-backend flashinfer \
    --enable-prefix-caching \
    --chat-template unsloth.jinja \
    -tp {tensor_parallel} \
    --distributed-executor-backend ray
