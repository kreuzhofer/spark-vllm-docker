# Recipe: Qwen/Qwen3.6-35B-A3B (BF16)
# Native BF16 weights (~67 GB on disk). Architecture is byte-for-byte identical
# to Qwen3.5-35B-A3B (per Qwen team), so the 3.5 mods apply unchanged.

recipe_version: "1"
name: Qwen36-35B-A3B-BF16
description: vLLM serving Qwen3.6-35B-A3B in native BF16

# HuggingFace model to download (optional, for --download-model)
model: Qwen/Qwen3.6-35B-A3B

# Supports both single-node and multi-node — runner overrides tensor_parallel
# to 1 in solo mode automatically.

# Container image to use
container: vllm-node

# Mod required to fix slowness and crash in the cluster
# (tracking https://github.com/vllm-project/vllm/issues/33857)
mods:
  - mods/fix-qwen3-coder-next
  - mods/fix-qwen3.5-chat-template

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.85
  max_model_len: 32768
  max_num_batched_tokens: 8192

# Environment variables
env: {}

# The vLLM serve command template
command: |
  vllm serve Qwen/Qwen3.6-35B-A3B \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --load-format fastsafetensors \
    --attention-backend flashinfer \
    --enable-prefix-caching \
    --chat-template unsloth.jinja \
    -tp {tensor_parallel} \
    --distributed-executor-backend ray
